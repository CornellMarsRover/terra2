name: Build and test
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    container: ros:humble
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get self packages
        id: get-self-packages
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Build
        if: ${{ steps.get-self-packages.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: humble
          target-packages: ${{ steps.get-self-packages.outputs.self-packages }}

  test:
    needs: build
    runs-on: self-hosted
    container: ros:humble
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get self packages
        id: get-self-packages
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Test
        id: test
        if: ${{ steps.get-self-packages.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-test@v1
        with:
          rosdistro: humble
          target-packages: ${{ steps.get-self-packages.outputs.self-packages }}

      - name: Code coverage
        id: ccoverage
        run: |
          sudo apt-get update && sudo apt-get install lcov
          lcov --directory . --base-directory . --capture -o build/cov.info
          lcov -r build/cov.info "/opt/*" -o build/cov.info
          lcov -r build/cov.info "*/cmr_msgs/*" -o build/cov.info
          lcov -r build/cov.info "*/cmr_*/test/*" -o build/cov.info
          lcov -r build/cov.info "*.cxx" -o build/cov.info
          lcov -r build/cov.info "*.hxx" -o build/cov.info
          lcov -r build/cov.info "*.c" -o build/cov.info
          lcov -r build/cov.info "*.h" -o build/cov.info
          lcov -r build/cov.info "/usr/*" -o build/cov.info

      - name: Get clang tools
        id: tools
        run: |
          sudo apt install clang-format clang-tidy -y

      - name: Clean compile commands
        id: clean_db
        run: |
          bash scripts/clean_build_db_wd.sh

      - name: Static analysis
        id: analyze
        run: |
          bash scripts/check_wd.sh
