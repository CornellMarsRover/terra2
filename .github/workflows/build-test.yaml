name: Build and test
on:
  push:
  workflow_dispatch:
  schedule:
    # 4:30 AM EST every day
    - cron: "30 8 * * *"
jobs:
  test:
    runs-on: self-hosted
    container: 
      image: cornellmarsrover/dev:latest
      options: --user root
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get self packages
        id: get-self-packages
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Build
        if: ${{ steps.get-self-packages.outputs.self-packages != '' }}
        uses: autowarefoundation/autoware-github-actions/colcon-build@v1
        with:
          rosdistro: humble
          target-packages: ${{ steps.get-self-packages.outputs.self-packages }}

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ros-humble-ros2-control ros-humble-ros2-controllers ros-humble-xacro ros-humble-controller-manager ros-humble-robot-state-publisher ros-humble-joint-state-broadcaster ros-humble-rviz2

      - name: Test
        id: test
        if: ${{ steps.get-self-packages.outputs.self-packages != '' }}
        uses: cornellmarsrover/ros2-test-action@v1 #autowarefoundation/autoware-github-actions/colcon-test@v1
        with:
          rosdistro: humble
          target-packages: ${{ steps.get-self-packages.outputs.self-packages }}
          pytest-args: "-s"

      - name: Code coverage
        id: ccoverage
        run: |
          sudo apt-get update && sudo apt-get install lcov -y
          bash scripts/code_coverage.sh
