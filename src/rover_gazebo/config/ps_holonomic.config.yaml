teleop_twist_joy_node:
  ros__parameters:
    axis_linear: # Left thumb stick
      x: 1
      y: 0
    scale_linear:
      x: -0.15
      y: -0.15
    scale_linear_turbo:
      x: -0.3
      y: -0.3
    axis_angular:
      yaw: 3 # Right thumb stick horizontal
    scale_angular:
      yaw: -0.15
    scale_angular_turbo:
      yaw: -0.3
    enable_button: 4 # Left button
    enable_turbo_button: 5 # Right button
